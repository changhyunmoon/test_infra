# 기존 방식
FROM eclipse-temurin:17-jdk-jammy
WORKDIR /app
  
  # 1. 무지성으로 프로젝트의 모든 코드를 한 번에 복사
COPY . .
  
  # 2. 컨테이너 내부에서 바로 빌드 진행 (매번 모든 라이브러리를 새로 다운받음)
RUN chmod +x gradlew
RUN ./gradlew clean build -x test
  
  # 4. 빌드된 JAR를 그냥 바로 실행
ENTRYPOINT ["java", "-jar", "build/libs/gateway-service.jar"]