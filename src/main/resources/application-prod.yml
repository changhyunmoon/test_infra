server:
  port: 8080
  # 앞서 Nginx 설정에서 /api/ 경로를 사용했으므로 context-path를 맞춰줍니다.
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      # /api/actuator/health 경로를 활성화합니다.
      base-path: /actuator
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO